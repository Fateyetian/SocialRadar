<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SocialRadar — 内容详情</title>
<style>
  :root {
    --bg: #f8fafc; --surface: #ffffff; --border: #e2e8f0;
    --text: #1e293b; --text-dim: #64748b; --accent: #4f46e5;
    --accent-soft: #eef2ff; --radius: 14px;
    --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.06);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", "PingFang SC", sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 50% 0%, rgba(79,70,229,0.04), transparent 50%),
      radial-gradient(ellipse at 80% 100%, rgba(5,109,232,0.03), transparent 50%);
  }
  .container { max-width: 780px; margin: 0 auto; padding: 32px 20px; }
  .back-link {
    display: inline-flex; align-items: center; gap: 6px; color: var(--accent);
    text-decoration: none; font-size: 14px; font-weight: 600; margin-bottom: 24px;
  }
  .back-link:hover { opacity: 0.75; }

  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 32px; box-shadow: var(--shadow);
  }
  .platform-badge {
    display: inline-block; font-size: 11px; font-weight: 700; padding: 3px 10px;
    border-radius: 4px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 16px;
  }
  .platform-badge.xiaohongshu { background: #fff1f2; color: #e11d48; }
  .platform-badge.zhihu { background: #eff6ff; color: #2563eb; }

  .content-title { font-size: 22px; font-weight: 700; line-height: 1.45; margin-bottom: 14px; }
  .content-title em { font-style: normal; color: var(--accent); background: var(--accent-soft); padding: 0 2px; border-radius: 2px; }

  .content-meta {
    display: flex; gap: 18px; font-size: 14px; color: var(--text-dim); margin-bottom: 24px;
    align-items: center; flex-wrap: wrap;
  }
  .content-meta span { display: flex; align-items: center; gap: 4px; }
  .author-name { font-weight: 600; color: #475569; }

  .content-divider { border: none; border-top: 1px solid var(--border); margin: 0 0 24px 0; }

  .content-body {
    font-size: 15px; line-height: 1.85; color: #334155; white-space: pre-wrap; word-break: break-word;
  }
  .content-body p { margin-bottom: 14px; }
  .content-body em { font-style: normal; color: var(--accent); background: var(--accent-soft); padding: 0 2px; border-radius: 2px; }

  .detail-loading { color: var(--text-dim); font-size: 13px; margin-top: 20px; padding: 10px 0; display: none; }

  .source-link {
    display: inline-flex; align-items: center; gap: 6px; margin-top: 28px;
    color: #ffffff; text-decoration: none; font-weight: 600; font-size: 14px;
    padding: 10px 24px; border-radius: 10px; background: var(--accent);
    transition: background 0.2s;
  }
  .source-link:hover { background: #4338ca; }

  .footer { text-align: center; margin-top: 36px; color: var(--text-dim); font-size: 13px; }
  .footer a { color: var(--accent); text-decoration: none; font-weight: 500; }
</style>
</head>
<body>
<div class="container">
  <a href="/" class="back-link">&larr; 返回搜索结果</a>

  <div class="card">
    <div class="platform-badge" id="platformBadge"></div>
    <div class="content-title" id="contentTitle"></div>
    <div class="content-meta" id="contentMeta"></div>
    <hr class="content-divider">
    <div class="content-body" id="contentBody"></div>
    <div class="detail-loading" id="detailLoading">&#x1F50D; 正在获取更多内容...</div>
    <a class="source-link" id="sourceLink" href="#" target="_blank" rel="noopener">&#x1F517; 在新窗口查看原文</a>
  </div>

  <div class="footer">
    Built with &#x2764; for the AI community &middot;
    Powered by <a href="https://tikhub.io">TikHub</a> &amp; <a href="https://modelcontextprotocol.io">MCP</a>
  </div>
</div>

<script>
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

const params = new URLSearchParams(location.search);
const title = params.get('title') || '无标题';
const platform = params.get('platform') || '';
const platformName = params.get('platform_name') || '';
const author = params.get('author') || '';
const url = params.get('url') || '';
const summary = params.get('summary') || '';
const publishedAt = params.get('published_at') || '';
const likes = parseInt(params.get('likes') || '0');
const comments = parseInt(params.get('comments') || '0');
const collects = parseInt(params.get('collect_count') || '0');

document.title = title + ' — SocialRadar';
document.getElementById('platformBadge').textContent = platformName;
document.getElementById('platformBadge').className = 'platform-badge ' + platform;
document.getElementById('contentTitle').innerHTML = title;
document.getElementById('sourceLink').href = url;

// Meta line
var meta = '';
if (author) meta += '<span class="author-name">&#x1F464; ' + escapeHtml(author) + '</span>';
if (publishedAt) meta += '<span>&#x1F4C5; ' + escapeHtml(publishedAt) + '</span>';
if (likes > 0) meta += '<span>&#x2764; ' + likes.toLocaleString() + '</span>';
if (comments > 0) meta += '<span>&#x1F4AC; ' + comments.toLocaleString() + '</span>';
if (collects > 0) meta += '<span>&#x2B50; ' + collects.toLocaleString() + '</span>';
document.getElementById('contentMeta').innerHTML = meta;

// Show summary immediately
if (summary) {
  document.getElementById('contentBody').innerHTML =
    '<p>' + escapeHtml(summary) + '</p>';
} else {
  document.getElementById('contentBody').innerHTML =
    '<p style="color:var(--text-dim)">暂无内容摘要</p>';
}

// Background: try to load full content via detail API
(function() {
  var contentId = url.split('/').pop() || '';
  if (!contentId || !platform) return;
  document.getElementById('detailLoading').style.display = 'block';
  fetch('/api/detail/' + platform + '/' + encodeURIComponent(contentId) + '?url=' + encodeURIComponent(url))
    .then(function(resp) { return resp.ok ? resp.json() : Promise.reject(); })
    .then(function(data) {
      if (data.full_text && data.full_text.length > summary.length) {
        document.getElementById('contentBody').innerHTML =
          '<div style="white-space:pre-wrap;word-break:break-word">' + escapeHtml(data.full_text) + '</div>';
      }
    })
    .catch(function(){})
    .finally(function() {
      document.getElementById('detailLoading').style.display = 'none';
    });
})();
</script>
</body>
</html>
